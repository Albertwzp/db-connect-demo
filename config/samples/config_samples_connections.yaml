apiVersion: v1
kind: Namespace
metadata:
  name: db-connect-demo

---
apiVersion: db.connect.local/v1
kind: PostgreSQLConnection
metadata:
  name: postgres-primary
  namespace: db-connect-demo
spec:
  host: "postgres.db.svc.cluster.local"
  port: 5432
  username: "postgres"
  password: "password123"
  database: "testdb"

---
apiVersion: db.connect.local/v1
kind: MySQLConnection
metadata:
  name: mysql-primary
  namespace: db-connect-demo
spec:
  host: "mysql.db.svc.cluster.local"
  port: 3306
  username: "root"
  password: "password123"
  database: "testdb"

---
apiVersion: db.connect.local/v1
kind: SQLiteConnection
metadata:
  name: sqlite-local
  namespace: db-connect-demo
spec:
  filePath: "/data/test.db"

---
apiVersion: db.connect.local/v1
kind: KafkaConnection
metadata:
  name: kafka-cluster
  namespace: db-connect-demo
spec:
  brokers:
    - "kafka-0.kafka-headless.kafka.svc.cluster.local:9092"
    - "kafka-1.kafka-headless.kafka.svc.cluster.local:9092"
    - "kafka-2.kafka-headless.kafka.svc.cluster.local:9092"

---
apiVersion: db.connect.local/v1
kind: SolaceConnection
metadata:
  name: solace-broker
  namespace: db-connect-demo
spec:
  brokerURL: "tcp://solace.messaging.svc.cluster.local:55555"
  username: "default"
  password: "default"
