apiVersion: v1
kind: Namespace
metadata:
  name: db-connect-demo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-connect-demo
  namespace: db-connect-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-connect-demo
  template:
    metadata:
      labels:
        app: db-connect-demo
    spec:
      serviceAccountName: db-connect-operator
      containers:
      - name: operator
        image: db-connect-demo:latest
        imagePullPolicy: IfNotPresent
        args:
        - -port=8080
        - -metrics-bind-address=:8081
        - -health-probe-bind-address=:8082
        - -leader-elect=false
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8081
          protocol: TCP
        - name: health
          containerPort: 8082
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: db-connect-demo
  namespace: db-connect-demo
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: db-connect-demo