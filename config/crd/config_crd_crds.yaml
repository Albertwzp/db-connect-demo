apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: postgresqlconnections.db.connect.local
spec:
  group: db.connect.local
  names:
    kind: PostgreSQLConnection
    plural: postgresqlconnections
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required: ["host", "username", "password", "database"]
            properties:
              host:
                type: string
                description: "PostgreSQL host"
              port:
                type: integer
                minimum: 1
                maximum: 65535
                default: 5432
                description: "PostgreSQL port (default: 5432)"
              username:
                type: string
                description: "PostgreSQL username"
              password:
                type: string
                description: "PostgreSQL password"
              database:
                type: string
                description: "PostgreSQL database name"
          status:
            type: object
            properties:
              connected:
                type: boolean
              error:
                type: string
              lastProbeTime:
                type: string
                format: date-time
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    observedGeneration:
                      type: integer
    subresources:
      status: {}

